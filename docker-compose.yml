# docker-compose.yml
#
# WHY THIS FILE EXISTS
# The Dockerfile defines HOW to build one image. docker-compose.yml defines
# HOW TO RUN multiple containers together as a system. It replaces a long
# `docker run` command with a single `docker compose up`.
#
# TWO DEPLOYMENT MODES
# This file serves two different contexts. The difference is one line per service:
#
#   Development:
#     build: .          ← Docker builds the image locally from the Dockerfile
#     env_file: .env    ← credentials are in your gitignored .env file
#
#   Demo (predictive-maintenance-demo repo — external users):
#     image: ghcr.io/preempt-analytics/predictive-maintenance-capstone:latest
#     env_file: .env    ← in the demo repo, .env is a copy of the committed .env.demo
#
#   In the demo repo, `build:` is replaced by `image:` so users pull a pre-built
#   image from GitHub Container Registry instead of compiling everything locally.
#   That is what makes the demo a three-command experience.
#
# HOW TO USE
#   Start everything:          docker compose up
#   Start in background:       docker compose up -d
#   Stop everything:           docker compose down
#   Rebuild after code change: docker compose up --build
#   Run the simulator once:    docker compose run --rm simulator --mode sudden-spike --n-readings 500
#   View logs:                 docker compose logs -f
#   View one service's logs:   docker compose logs -f api


# ── Version ───────────────────────────────────────────────────────────────────
# The compose file format version. 3.9 is stable and widely supported.
# Do not confuse this with the Docker Engine version.
version: "3.9"


services:

  # ── API ─────────────────────────────────────────────────────────────────────
  # The FastAPI serving layer. Loads the @production model at startup and
  # answers POST /predict requests. This is the service external callers use.
  api:
    # DEVELOPMENT: build the image locally from the Dockerfile in this directory.
    build: .
    # DEMO REPO: replace the line above with the line below so users pull the
    # pre-built image from GitHub Container Registry instead of building locally.
    # image: ghcr.io/preempt-analytics/predictive-maintenance-capstone:latest
    container_name: preempt-api
    ports:
      # "host_port:container_port" — maps port 8000 on your machine to port 8000
      # inside the container. Change the left number to run on a different host port
      # (e.g. "8080:8000" if port 8000 is taken on your machine).
      - "8000:8000"

    env_file:
      # Injects environment variables into the container from a file.
      # The API needs MLFLOW_TRACKING_URI, MLFLOW_TRACKING_USERNAME, and
      # MLFLOW_TRACKING_PASSWORD to load the @production model from DagsHub.
      #
      # Development: .env is gitignored — fill it in once from .env.example.
      # Demo repo:   .env.demo is committed with read-only demo credentials.
      #              Users run `cp .env.demo .env` before `docker compose up`.
      #
      # To verify variables are correct before starting: docker compose config
      # This prints the resolved compose file with all variables substituted.
      - .env

    volumes:
      # A volume maps a directory on your host machine into the container.
      # Without volumes, any file written inside the container disappears when
      # it stops. With them, the data persists and is visible on both sides.
      #
      # simulation.db lives at data/simulation.db, so the single data/ volume
      # below covers it. All three services share the same host directory —
      # the simulator writes readings, the monitor reads them for drift detection.
      - ./data:/app/data       # simulation.db + baseline CSV
      - ./reports:/app/reports # drift reports written here are visible on the host

    healthcheck:
      # Docker calls GET /health every 30 seconds and marks the container
      # "healthy" when it returns HTTP 200. The monitor and simulator use
      # depends_on: condition: service_healthy — they will not start until
      # this check passes, preventing predictions against an unloaded model.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s    # how often to check
      timeout: 10s     # how long to wait for a response
      retries: 3       # how many failures before marking unhealthy
      start_period: 15s # grace period on startup before checks begin

    restart: unless-stopped  # restart automatically if the container crashes


  # ── Monitor ──────────────────────────────────────────────────────────────────
  # Runs detect_drift.py on a schedule. When drift is detected it exports the
  # simulation data and triggers the retraining pipeline via GitHub Actions.
  # Uses the same image as the API but overrides CMD with its own command.
  monitor:
    build: .
    # DEMO REPO: same swap as the api service — replace build with image.
    # image: ghcr.io/preempt-analytics/predictive-maintenance-capstone:latest
    container_name: preempt-monitor
    command: ["python", "scripts/monitor.py"]  # overrides the CMD in Dockerfile

    env_file:
      - .env  # needs MLflow credentials for model loading + git credentials for push

    environment:
      # Git needs an author identity to create commits inside the container.
      # These are read from .env so the demo repo can commit them without
      # hardcoding anything here. In the demo repo, .env.demo sets these to
      # the bot account (e.g. GIT_AUTHOR_NAME=preempt-analytics-bot).
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Preempt Analytics}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-bot@preempt-analytics.com}
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME:-Preempt Analytics}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL:-bot@preempt-analytics.com}

    volumes:
      - ./data:/app/data     # simulation.db + baseline CSV
      - ./reports:/app/reports  # drift HTML reports

      # ── Git access for the retrain push ────────────────────────────────────
      # The Dockerfile excludes .git (see .dockerignore), so the container has
      # no git repo by default. The monitor needs git to commit retrain.trigger
      # and push to GitHub so GitHub Actions fires the retrain workflow.
      #
      # Solution: mount .git from the host. This gives the container the full
      # git history and the origin remote already pointing at the correct repo —
      # the demo repo when cloned from predictive-maintenance-demo, the main
      # repo when running locally in development.
      #
      # The push uses HTTPS credentials from GIT_REMOTE_URL in .env:
      #   GIT_REMOTE_URL=https://<github-pat>@github.com/Preempt-analytics/predictive-maintenance-demo.git
      # export_simulation_to_parquet.py reads this variable and calls
      # `git remote set-url origin $GIT_REMOTE_URL` before pushing, so no
      # SSH key setup is needed on the demo user's machine.
      #
      # Uncomment the line below to enable git push from the monitor container:
      # - ./.git:/app/.git

    depends_on:
      api:
        condition: service_healthy  # wait for the API to be ready before starting

    restart: unless-stopped


  # ── Simulator ────────────────────────────────────────────────────────────────
  # The simulator is NOT a long-running service — it is a one-shot command you
  # run on demand to generate sensor readings. Use `docker compose run` not `up`.
  #
  # Usage examples:
  #   docker compose run --rm simulator --mode normal --n-readings 500
  #   docker compose run --rm simulator --mode sudden-spike --n-readings 1000 --detect-drift
  #
  # --rm removes the container automatically after it exits (keeps things tidy).
  # Arguments after the service name are passed directly to sensor_simulator.py.
  simulator:
    build: .
    # DEMO REPO: same swap as the other services.
    # image: ghcr.io/preempt-analytics/predictive-maintenance-capstone:latest
    container_name: preempt-simulator
    # The entrypoint is the fixed part of the command — sensor_simulator.py with
    # the API URL pre-configured. Arguments passed via `docker compose run` are
    # appended after this (e.g. --mode normal --n-readings 500).
    #
    # Why http://api:8000 and not http://localhost:8000?
    # Inside Docker's network, containers reach each other by service name, not
    # by localhost. "api" resolves to the api container's internal IP address.
    # Using localhost here would mean "this simulator container" — the wrong target.
    entrypoint: ["python", "src/sensor_simulator.py", "--api-url", "http://api:8000"]

    env_file:
      - .env

    volumes:
      - ./data:/app/data  # simulation.db is written here by the simulator

    depends_on:
      api:
        condition: service_healthy  # simulator needs the API running to send predictions

    profiles:
      # "profiles" means this service is NOT started by `docker compose up`.
      # It only runs when explicitly requested: `docker compose run simulator ...`
      # This prevents the simulator from running in the background consuming
      # resources when you just want the API and monitor running.
      - tools
