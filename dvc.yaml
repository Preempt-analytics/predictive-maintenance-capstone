# DVC Pipeline — Predictive Maintenance
# =======================================
# A DVC pipeline is a set of stages. Each stage records:
#
#   cmd    → the exact shell command that runs this experiment
#   deps   → files that, if changed, should trigger a rerun of this stage
#   params → specific keys inside params.yaml that, if changed, trigger a rerun
#            of only the stages that reference them (unlike deps, which hash the
#            whole file — params tracking is key-level, not file-level)
#
# DVC hashes every dep file. On `dvc repro`, it compares current hashes
# to the last recorded ones. If anything changed → stage is stale → reruns.
#
# Usage:
#   dvc repro                          # rerun all stages whose deps changed
#   dvc repro train_xgb_binary         # rerun one stage only
#   dvc repro --dry                    # preview what would rerun without running
#
# Note: outputs go to MLflow (not local files), so there are no `outs` entries.
# DVC tracks reproducibility via deps and params only.

stages:
  # ── Worked example: read this one carefully before filling in the rest ────────
  #
  # Stage name convention: train_<model-family>_<target-type>
  # cmd runs modeling_pipeline.py with --experiment matching an EXPERIMENTS key.
  # deps lists every file whose change should invalidate (mark as needing re-run) this stage:
  #   - the pipeline script itself
  #   - the feature engineering module (shared with simulator)
  #   - the dataset (tracked by DVC, not git)
  # params lists the keys inside params.yaml that this stage depends on.
  #   A change to pipeline.test_size invalidates all stages (correct — it affects
  #   every train/test split). A change to a key not listed here has no effect.

  train_xgb_binary:
    cmd: python modeling_pipeline.py --experiment xgb_binary
    deps:
      - modeling_pipeline.py
      - feature_transformation.py
      - data/ai4i2020.csv
    params:
      - params.yaml:
        - pipeline

  # ── Fill this one in — same model family, different target ───────────────────
  # Hint: multiclass means we predict which failure type, not just whether failure occurred.
  # The --experiment value must match a key in the EXPERIMENTS dict in modeling_pipeline.py.

  train_xgb_multiclass:
    cmd: python modeling_pipeline.py --experiment xgb_multiclass
    deps:
      - modeling_pipeline.py
      - feature_transformation.py
      - data/ai4i2020.csv
    params:
      - params.yaml:
        - pipeline

  # ── Tree-based: LightGBM ──────────────────────────────────────────────────────
  # Same pattern as XGBoost. Two stages: binary and multiclass.
  # What changes between them? Only the --experiment argument.

  train_lgbm_binary:
    cmd: python modeling_pipeline.py --experiment lgbm_binary
    deps:
      - modeling_pipeline.py
      - feature_transformation.py
      - data/ai4i2020.csv
    params:
      - params.yaml:
        - pipeline

  train_lgbm_multiclass:
    cmd: python modeling_pipeline.py --experiment lgbm_multiclass
    deps:
      - modeling_pipeline.py
      - feature_transformation.py
      - data/ai4i2020.csv
    params:
      - params.yaml:
        - pipeline

  # ── Tree-based: Random Forest ─────────────────────────────────────────────────
  # Why does Random Forest belong in the same pipeline structure as XGBoost/LightGBM?
  # What do all three have in common that justifies identical deps?

  train_rf_binary:
    cmd: python modeling_pipeline.py --experiment rf_binary
    deps:
      - modeling_pipeline.py
      - feature_transformation.py
      - data/ai4i2020.csv
    params:
      - params.yaml:
        - pipeline

  train_rf_multiclass:
    cmd: python modeling_pipeline.py --experiment rf_multiclass
    deps:
      - modeling_pipeline.py
      - feature_transformation.py
      - data/ai4i2020.csv
    params:
      - params.yaml:
        - pipeline

  # ── Probabilistic: Logistic Regression ───────────────────────────────────────
  # logreg uses needs_scaling=False in modeling_pipeline.py.
  # Does that change anything in dvc.yaml? Why or why not?

  train_logreg_binary:
    cmd: python modeling_pipeline.py --experiment logreg_binary
    deps:
      - modeling_pipeline.py
      - feature_transformation.py
      - data/ai4i2020.csv
    params:
      - params.yaml:
        - pipeline

  train_logreg_multiclass:
    cmd: python modeling_pipeline.py --experiment logreg_multiclass
    deps:
      - modeling_pipeline.py
      - feature_transformation.py
      - data/ai4i2020.csv
    params:
      - params.yaml:
        - pipeline

  # ── Distance-based: SVM ───────────────────────────────────────────────────────
  # SVM uses needs_scaling=True — StandardScaler is inserted by modeling_pipeline.py.
  # Should feature_transformation.py still be listed as a dep? Why?

  train_svm_binary:
    cmd: python modeling_pipeline.py --experiment svm_binary
    deps:
      - modeling_pipeline.py
      - feature_transformation.py
      - data/ai4i2020.csv
    params:
      - params.yaml:
        - pipeline

  train_svm_multiclass:
    cmd: python modeling_pipeline.py --experiment svm_multiclass
    deps:
      - modeling_pipeline.py
      - feature_transformation.py
      - data/ai4i2020.csv
    params:
      - params.yaml:
        - pipeline

  # ── Neural Network: MLP ───────────────────────────────────────────────────────
  # MLP also uses needs_scaling=True and has early_stopping built in.
  # The deps are identical to every other stage — why is that consistent and correct?

  train_mlp_binary:
    cmd: python modeling_pipeline.py --experiment mlp_binary
    deps:
      - modeling_pipeline.py
      - feature_transformation.py
      - data/ai4i2020.csv
    params:
      - params.yaml:
        - pipeline

  train_mlp_multiclass:
    cmd: python modeling_pipeline.py --experiment mlp_multiclass
    deps:
      - modeling_pipeline.py
      - feature_transformation.py
      - data/ai4i2020.csv
    params:
      - params.yaml:
        - pipeline
